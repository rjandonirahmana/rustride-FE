name: RustRide Frontend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install & Type check
        run: |
          bun install --frozen-lockfile
          bun run tsc --noEmit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rustrideapp-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rustrideapp-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rustrideapp-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rustrideapp-frontend:buildcache,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/rustrideapp-frontend:latest
            docker stop rustrideapp-frontend || true
            docker rm   rustrideapp-frontend || true
            docker run -d \
              --name rustrideapp-frontend \
              --runtime=youki \
              --restart=unless-stopped \
              --memory=256m \
              --cpus=0.5 \
              -p 3100:3100 \
              ${{ secrets.DOCKERHUB_USERNAME }}/rustrideapp-frontend:latest

            docker image prune -f
